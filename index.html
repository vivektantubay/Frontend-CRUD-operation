<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRUD Operations with REST API</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <h1>User Manager</h1>
      
    </header>

    <!-- Alert / error -->
    <div id="alertBox" class="alert hidden"></div>

    <!-- CREATE / UPDATE FORM -->
    <section class="card">
      <h2 id="formTitle">Add New User</h2>
      <form id="userForm">
        <input type="hidden" id="userId">

        <div class="form-row">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="e.g. Ravi saw" required>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="e.g. Ravi@example.com" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="phone">Phone</label>
            <input type="text" id="phone" placeholder="e.g. +919875">
          </div>
          <div class="form-group">
            <label for="company">Company</label>
            <input type="text" id="company" placeholder="e.g. TCS.">
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" id="submitBtn" class="btn btn-primary">Add User</button>
          <button type="button" id="cancelBtn" class="btn btn-secondary hidden">Cancel</button>
        </div>
      </form>
    </section>

    <!-- READ: DATA TABLE -->
    <section class="card">
      <div class="table-header">
        <h2>Users</h2>
        <button id="refreshBtn" class="btn btn-outline">⟳ Refresh</button>
      </div>

      <div id="loader" class="loader hidden">Loading...</div>

      <div class="table-wrapper">
        <table id="userTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Company</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <!-- Rows injected by JavaScript -->
          </tbody>
        </table>
      </div>
    </section>
  </div>

<script src="script.js"></script>
</body>
</html>
